<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>اطلس نیشابور</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html,body{
margin:0;
padding:0;
height:100%;
font-family:tahoma;
}

#map{
width:100%;
height:100%;
}

.title{
position:absolute;
top:10px;
right:10px;
z-index:1000;
background:white;
padding:10px;
border-radius:10px;
font-weight:bold;
box-shadow:0 0 8px #888;
}
</style>

</head>

<body>

<div class="title">
اطلس نیشابور
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var osm=L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
maxZoom:19,
attribution:'© OpenStreetMap'
});

var satellite=L.tileLayer(
'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
{
maxZoom:19,
attribution:'Tiles © Esri'
});

var map=L.map('map',{
center:[36.2133,58.7958],
zoom:11,
layers:[osm]
});

L.control.layers({
"نقشه":osm,
"ماهواره":satellite
}).addTo(map);

L.control.scale().addTo(map);

L.marker([36.2133,58.7958])
.addTo(map)
.bindPopup("<b>نیشابور</b>")
.openPopup();

map.on("click",function(e){

L.popup()
.setLatLng(e.latlng)
.setContent(
"عرض: "+e.latlng.lat.toFixed(5)+"<br>"+
"طول: "+e.latlng.lng.toFixed(5)
)
.openOn(map);

});

</script>

</body>
</html>
