<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>اطلس سه‌بعدی نیشابور</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html,body{
margin:0;
height:100%;
font-family:tahoma;
}

#map{
height:100%;
}

.title{
position:absolute;
top:10px;
right:10px;
z-index:999;
background:white;
padding:10px;
border-radius:10px;
box-shadow:0 0 10px gray;
font-weight:bold;
}
</style>

</head>

<body>

<div class="title">
اطلس نیشابور
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var map=L.map('map').setView([36.2133,58.7958],11);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map);

L.marker([36.2133,58.7958])
.addTo(map)
.bindPopup("شهر نیشابور")
.openPopup();

</script>

</body>
</html>
